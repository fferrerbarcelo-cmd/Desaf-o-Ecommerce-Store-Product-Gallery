<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Repostería</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="galeria">

    <div class="item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYtmTi4WTgnDadMfFYIgTp2JKbjIkGa4ywZtnnYhqrzg&s=10" alt="Torta de Chocolate">

        <h3>Torta de Chocolate</h3>

        <p class="precio">$45.500 ARS</p>

        <button>Comprar</button>
    </div>

    <div class="item">
        <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/..." alt="Chocotorta">

        <h3>Chocotorta</h3>

        <p class="precio">$30.000 ARS</p>

        <button>Comprar</button>
    </div>

    <div class="item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzaIoLvKXAvFoL0mmB-FdKt1tg5OvjGPSMwQBjusgGuw&s=10" alt="Cheesecake de Frutos Rojos">

        <h3>Cheesecake de Frutos Rojos</h3>

        <p class="precio">$35.500 ARS</p>

        <button>Comprar</button>
    </div>

    <div class="item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRD4oCDH_Gp4pKER9XpiqNJooFnvksBFx5ZLLna1jpa3KefU5uPYb4Sjsn-hZQwbBTZrBglw_wP&s=10" alt="Banoffee">

        <h3>Banoffee</h3>

        <p class="precio">$22.500 ARS</p>

        <button>Comprar</button>
    </div>

</div>

</body>
</html>
